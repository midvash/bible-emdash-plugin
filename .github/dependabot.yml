version: 2
updates:
  # The plugin's own dev tooling (tsdown, vitest, emdash, typescript, …).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        patterns: ["*"]
    commit-message:
      prefix: "chore(deps)"

  # Keep the GitHub Actions in CI/Release pinned-but-fresh.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
